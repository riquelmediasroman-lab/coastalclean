<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CoastalClean - Panel de Datos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #020617; --accent: #00d4ff; --card: #111827; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        header { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); padding: 1.2rem 5%; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo span { color: var(--accent); font-weight: bold; }
        
        .container { padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .m-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; text-align: center; }
        .m-card:hover { border-color: var(--accent); transform: scale(1.02); }
        .m-card span { color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .m-card h3 { font-size: 2.2rem; margin: 10px 0 0; color: var(--accent); }
        
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .chart-box { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
        @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">Coastal<span>Clean</span></div>
        <nav><a href="index.html" style="color:#fff; text-decoration:none;">Volver al Inicio</a></nav>
    </header>

    <main class="container">
        <h2 style="margin-bottom:30px;">Panel de Impacto <span style="color:var(--accent)">México 2026</span></h2>
        
        <div class="metrics">
            <div class="m-card"><span>Total Recolectado</span><h3>1,250 kg</h3></div>
            <div class="m-card"><span>Voluntarios</span><h3>482</h3></div>
            <div class="m-card"><span>Limpiezas</span><h3>24</h3></div>
            <div class="m-card"><span>Área Limpiada</span><h3>5.2 km²</h3></div>
        </div>

        <div class="charts-grid">
            <div class="chart-box">
                <h4 style="margin-top:0;">Residuos por Zona (Kg)</h4>
                <canvas id="mainChart" height="150"></canvas>
            </div>
            <div class="chart-box">
                <h4 style="margin-top:0;">Composición</h4>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Gráfica de Barras
        new Chart(document.getElementById('mainChart'), {
            type: 'bar',
            data: {
                labels: ['Cancún', 'Veracruz', 'Mazatlán', 'Cabo San Lucas', 'Acapulco'],
                datasets: [{
                    label: 'Plástico Recolectado (Kg)',
                    data: [450, 320, 280, 510, 390],
                    backgroundColor: 'rgba(0, 212, 255, 0.6)',
                    borderColor: '#00d4ff',
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: { scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } }, plugins: { legend: { display: false } } }
        });

        // Gráfica de Pay
        new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: {
                labels: ['PET', 'Vidrio', 'Microplásticos', 'Redes'],
                datasets: [{
                    data: [55, 15, 20, 10],
                    backgroundColor: ['#00d4ff', '#3b82f6', '#1e293b', '#6366f1'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 20 } } }, cutout: '70%' }
        });
    </script>
</body>
</html>
