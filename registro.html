<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CoastalClean - Hazte Voluntario</title>
    <style>
        :root { --bg: #020617; --accent: #00d4ff; --glass: rgba(30, 41, 59, 0.7); }
        body { background: radial-gradient(circle at center, #0f172a, var(--bg)); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .form-container { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 30px; width: 100%; max-width: 650px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .form-container::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,212,255,0.05) 0%, transparent 70%); z-index: -1; }
        
        h2 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 800; text-align: center; }
        p { text-align: center; color: #94a3b8; margin-bottom: 35px; font-size: 0.95rem; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.8rem; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
        
        input, select, textarea { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; color: white; font-family: inherit; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,212,255,0.2); outline: none; background: rgba(0,0,0,0.4); }
        
        .phone-box { display: flex; align-items: center; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .phone-box span { padding: 0 15px; color: var(--accent); font-weight: bold; border-right: 1px solid rgba(255,255,255,0.1); }
        .phone-box input { border: none; width: 100%; background: transparent; }
        
        .btn-reg { background: var(--accent); color: #020617; border: none; padding: 18px; border-radius: 15px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.4s; margin-top: 20px; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .btn-reg:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,212,255,0.4); background: #fff; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Hazte Voluntario</h2>
        <p>Únete a las brigadas de limpieza en las costas de México</p>
        <form onsubmit="alert('¡Registro enviado! Te contactaremos pronto.'); return false;">
            <div class="form-row">
                <div class="input-group"><label>Nombre Completo *</label><input type="text" placeholder="Tu nombre" required></div>
                <div class="input-group"><label>Email *</label><input type="email" placeholder="ejemplo@uvm.mx" required></div>
            </div>
            <div class="form-row">
                <div class="input-group"><label>Teléfono</label><div class="phone-box"><span>+52</span><input type="tel" placeholder="55 1234 5678" required></div></div>
                <div class="input-group">
                    <label>Ciudad / Estado *</label>
                    <select required>
                        <option value="">Selecciona...</option>
                        <option>Ciudad de México</option><option>Quintana Roo</option><option>Veracruz</option><option>Baja California</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label>Experiencia</label>
                    <select><option>Sin experiencia</option><option>He participado antes</option><option>Experto en buceo</option></select>
                </div>
                <div class="input-group">
                    <label>Disponibilidad</label>
                    <select><option>Fines de semana</option><option>Entre semana</option><option>Remoto (Digital)</option></select>
                </div>
            </div>
            <div class="input-group"><label>¿Por qué quieres participar?</label><textarea rows="3" placeholder="Cuéntanos qué te motiva..."></textarea></div>
            <button type="submit" class="btn-reg">Registrarme Ahora →</button>
        </form>
    </div>
</body>
</html>
